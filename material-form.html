<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Material UI Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="./assets/css/material-form.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg custom-navbar">

<div class="container">

<a class="navbar-brand" href="#">
<i class="bi bi-boxes"></i> CODE AXIS
</a>

<div class="nav-links ms-auto">

<a href="../index.html">
Login
</a>

<a href="registration.html" class="active-link">
Register
</a>

<a href="forgot-password.html">
Forgot Password
</a>

</div>

</div>

</nav>

<!-- MAIN SECTION -->

<section class="material-section">

<div class="container">

<!-- HEADING -->

<div class="section-heading">

<h1>
Material UI Registration
</h1>

<p>
Modern material design registration interface
</p>

</div>

<!-- MATERIAL CARD -->

<div class="material-wrapper">

<div class="material-card">

<div class="material-icon">

<i class="bi bi-layers"></i>

</div>

<h2>
Create Account
</h2>

<p class="form-subtitle">
Register with clean material design
</p>

<form>

<div class="input-group-custom">

<input type="text" required>

<label>
Full Name
</label>

</div>

<div class="input-group-custom">

<input type="email" required>

<label>
Email Address
</label>

</div>

<div class="input-group-custom">

<input type="text" required>

<label>
Phone Number
</label>

</div>

<div class="input-group-custom password-box">

<input type="password" id="materialPassword" required>

<label>
Password
</label>

<span class="toggle-password" id="materialToggle">

<i class="bi bi-eye-slash"></i>

</span>

</div>

<button type="submit" class="btn-material">

Create Account

</button>

<div class="bottom-text">

Already have an account?

<a href="../index.html">
Login
</a>

</div>

</form>

</div>

</div>

</div>

</section>

<script src="../assets/js/material-form.js"></script>

</body>
</html>
