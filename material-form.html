<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Material Auth System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="assets/css/material-form.css">
</head>

<body>

<div class="card">

  <div class="brand">Code Axis</div>
  <div class="sub">Corporate Authentication</div>

  <!-- LOGIN FORM -->
  <form id="loginForm" class="form active">

    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button type="submit" id="loginBtn">Login</button>

    <div class="msg" id="loginMsg"></div>

    <p class="link">
      Don’t have an account?
      <a href="#" id="showSignup">Create Account</a>
    </p>

  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm" class="form">

    <h2>Create Account</h2>

    <input type="text" id="signupName" placeholder="Name" required>
    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password (min 8 chars)" required>
    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>

    <button type="submit" id="signupBtn">Create Account</button>

    <div class="msg" id="signupMsg"></div>

    <p class="link">
      Already have an account?
      <a href="#" id="showLogin">Login</a>
    </p>

  </form>

</div>

<!-- FIXED SCRIPT PATH -->
<script src="assets/js/material-form.js"></script>

</body>
</html>
