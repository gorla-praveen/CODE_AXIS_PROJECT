<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/split-login.css">
</head>
<body>

<div class="split-wrapper container-fluid">

<div class="row g-0 split-card">

<div class="col-lg-6 image-panel">
</div>

<div class="col-lg-6 form-panel">

<h2>Login to Continue</h2>
<p>Modern split authentication UI</p>

<form>

<input type="email" class="form-control split-input" placeholder="Email Address">

<div class="password-box">
<input type="password" class="form-control split-input" id="splitPassword" placeholder="Password">

<span class="toggle-password" id="splitToggle">
<i class="bi bi-eye-slash"></i>
</span>
</div>

<button class="split-btn">
Access Dashboard
</button>

</form>

</div>

</div>

</div>

<script src="assets/js/split-login.js"></script>

</body>
</html>
