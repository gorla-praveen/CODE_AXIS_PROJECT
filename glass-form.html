<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Auth System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="assets/css/glass-form.css">
</head>

<body>

<div class="card">

  <div class="brand">
    <img src="assets/images/logo.png" alt="Logo">
    <span>Code Axis</span>
</div>
  <div class="sub">Glass Authentication</div>

  <!-- LOGIN -->
  <form id="loginForm" class="form active">

    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button type="submit">Login</button>

    <div class="msg" id="loginMsg"></div>

    <p class="link">
      Don’t have an account?
      <a href="#" id="showSignup">Create Account</a>
    </p>

  </form>

  <!-- SIGNUP -->
  <form id="signupForm" class="form">

    <input type="text" id="signupName" placeholder="Name" required>
    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>
    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>

    <button type="submit">Create Account</button>

    <div class="msg" id="signupMsg"></div>

    <p class="link">
      Already have an account?
      <a href="#" id="showLogin">Login</a>
    </p>

  </form>

</div>

<script src="assets/js/glass-form.js"></script>

</body>
</html>
