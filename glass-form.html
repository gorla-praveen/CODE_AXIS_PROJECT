<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/glass-form.css">
</head>

<body>

<div class="glass-card">

  <h2>Create Account</h2>

  <form id="registerForm">

    <input type="text" class="glass-input" id="name" placeholder="Full Name">

    <input type="email" class="glass-input" id="email" placeholder="Email Address">

    <input type="password" class="glass-input" id="password" placeholder="Password">

    <button type="submit" class="glass-btn">
      Create Account
    </button>

    <p id="error" style="color:red;margin-top:10px;"></p>

  </form>

</div>

<script src="../assets/js/glass-form.js"></script>

</body>
</html>
