<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password Flow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/forgot-password.css">

</head>

<body>

<div class="forgot-wrapper">

<!-- STEP 1 -->

<div id="step1">

<div class="brand-icon">
    <img src="assets/images/logo.png" alt="Logo">
</div>

<h1 class="title">
Forgot Password?
</h1>

<p class="subtitle">
Enter your registered email address to receive an OTP.
</p>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input
type="email"
class="form-control"
id="email"
placeholder="Enter your email"
>

</div>

<button class="reset-btn" id="sendOtpBtn">

<span id="sendText">
Send OTP
</span>

<span
class="spinner-border spinner-border-sm d-none"
id="sendLoader">
</span>

</button>

</div>

<!-- STEP 2 -->

<div id="step2" class="step-box">

<div class="icon-box">
<i class="bi bi-shield-lock"></i>
</div>

<h1 class="title">
Verify OTP
</h1>

<p class="subtitle">
Enter the OTP sent to your email address.
</p>

<div class="mb-3">

<label class="form-label">
OTP
</label>

<input
type="text"
class="form-control"
id="otp"
placeholder="Enter OTP"
>

</div>

<button class="reset-btn" id="verifyOtpBtn">

<span id="verifyText">
Verify OTP
</span>

<span
class="spinner-border spinner-border-sm d-none"
id="verifyLoader">
</span>

</button>

</div>

<!-- STEP 3 -->

<div id="step3" class="step-box">

<div class="icon-box">
<i class="bi bi-key"></i>
</div>

<h1 class="title">
Reset Password
</h1>

<p class="subtitle">
Create a new secure password.
</p>

<div class="mb-3">

<label class="form-label">
New Password
</label>

<div class="password-box">

<input
type="password"
class="form-control"
id="newPassword"
placeholder="Enter new password"
>

<span class="toggle-password" id="toggleNewPassword">
<i class="bi bi-eye-slash"></i>
</span>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Confirm Password
</label>

<div class="password-box">

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Confirm password"
>

<span class="toggle-password" id="toggleConfirmPassword">
<i class="bi bi-eye-slash"></i>
</span>

</div>

</div>

<button class="reset-btn" id="resetPasswordBtn">

<span id="resetText">
Reset Password
</span>

<span
class="spinner-border spinner-border-sm d-none"
id="resetLoader">
</span>

</button>

</div>

<!-- STEP 4 -->

<div id="step4" class="step-box">

<div class="success-icon">
<i class="bi bi-check-circle-fill"></i>
</div>

<h1 class="title">
Success!
</h1>

<p class="subtitle">
Your password has been reset successfully.
</p>

<a
href="index.html"
class="reset-btn d-flex align-items-center justify-content-center text-decoration-none">

Back To Login

</a>

</div>

<div class="message" id="messageBox"></div>

<div class="back-login">

<a href="index.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>

<script src="assets/js/forgot-password.js"></script>

</body>
</html>
